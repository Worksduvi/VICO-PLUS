<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PWA Chat — Cloud / Ollama</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1a73e8" />
  <style>
    :root{--bg:#0f1724;--card:#0b1220;--accent:#1a73e8;--muted:#9aa4b2;--text:#e6eef6}
    *{box-sizing:border-box;font-family:Inter,system-ui,Segoe UI,Roboto,Arial}
    html,body,#app{height:100%;margin:0;background:linear-gradient(180deg,#071024 0%,var(--bg) 100%);color:var(--text)}
    .container{max-width:820px;margin:20px auto;padding:14px}
    .card{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border-radius:12px;padding:12px;box-shadow:0 6px 24px rgba(2,6,23,.6)}
    header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
    header h1{font-size:18px;margin:0}
    .settings{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    .field{flex:1;min-width:160px;display:flex;flex-direction:column}
    label{font-size:12px;color:var(--muted);margin-bottom:6px}
    input,textarea,select,button{background:transparent;border:1px solid rgba(255,255,255,0.06);padding:10px;border-radius:8px;color:var(--text);outline:none}
    button{background:var(--accent);color:white;border:none;cursor:pointer}
    .btn.ghost{background:transparent;border:1px solid rgba(255,255,255,0.06)}
    .chat{height:56vh;overflow:auto;padding:12px;border-radius:10px;background:linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.00));margin-bottom:12px}
    .msg{margin-bottom:10px;display:flex;gap:10px}
    .msg.user{justify-content:flex-end}
    .bubble{max-width:76%;padding:10px 12px;border-radius:10px;background:#081227;color:var(--text);line-height:1.4;white-space:pre-wrap;word-break:break-word}
    .bubble.user{background:linear-gradient(90deg,var(--accent),#0f9cff);color:white}
    .footer{display:flex;gap:8px;align-items:center}
    .status{font-size:12px;color:var(--muted);margin-left:auto}
    .install-btn{background:#fff;color:#0b1220;padding:8px;border-radius:8px;border:none;cursor:pointer}
    .small{font-size:13px;color:var(--muted)}
    .hint{font-size:13px;color:var(--muted);margin-top:8px}
    .cmdBox{display:flex;gap:8px;align-items:center;margin-top:8px}
    @media (max-width:600px){.container{margin:8px}}
  </style>
</head>
<body>
  <div id="app" class="container">
    <div class="card">
      <header>
        <img src="/icon.png" alt="icon" width="40" height="40" style="border-radius:8px"/>
        <h1>PWA Chat — Conectar modelo en la nube</h1>
        <button id="installBtn" class="install-btn" style="margin-left:auto;display:none">Instalar</button>
      </header>

      <section class="settings" aria-label="Configuración">
        <div class="field" style="flex-basis:65%">
          <label for="endpoint">Endpoint API o comando (ej. https://mi-ollama.example o "ollama run gemma4:31b-cloud")</label>
          <input id="endpoint" placeholder="https://..." />
        </div>
        <div class="field" style="flex-basis:30%">
          <label for="apikey">API Key (opcional)</label>
          <input id="apikey" placeholder="Bearer token" />
        </div>

        <div style="display:flex;gap:8px;align-items:end;width:100%;margin-top:8px">
          <button id="saveBtn" class="btn">Guardar & Probar</button>
          <button id="clearBtn" class="btn ghost">Borrar credenciales</button>
          <div class="status" id="connStatus">No probado</div>
        </div>

        <div id="cmdHelp" class="hint" style="display:none">
          Has pegado un comando tipo <code>ollama run ...</code>. No se puede ejecutar desde el navegador. Opciones:
          <div class="cmdBox">
            <button id="copyCmd" class="btn">Copiar comando recomendado</button>
            <button id="showInstructions" class="btn ghost">Ver instrucciones</button>
          </div>
        </div>
      </section>

      <section class="chat" id="chat" aria-live="polite"></section>

      <div class="footer">
        <input id="userInput" placeholder="Escribe un mensaje..." style="flex:1;padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,0.06)" />
        <button id="sendBtn" class="btn">Enviar</button>
        <div class="small" style="margin-left:8px">Streaming: <span id="streamStatus">off</span></div>
      </div>

      <p class="small" style="margin-top:10px">Nota: las credenciales se guardan localmente en IndexedDB. Si usas un servidor local asegúrate de CORS y del esquema HTTP/HTTPS correcto.</p>
    </div>
  </div>

  <script>
  /* ---------- IndexedDB ---------- */
  const DB_NAME = 'pwa-chat-db', STORE = 'config';
  function openDb(){ return new Promise((res,rej)=>{ const rq=indexedDB.open(DB_NAME,1); rq.onupgradeneeded=e=>{ const db=e.target.result; if(!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE); }; rq.onsuccess=e=>res(e.target.result); rq.onerror=e=>rej(e); }); }
  async function dbPut(k,v){ const db=await openDb(); return new Promise((res,rej)=>{ const tx=db.transaction(STORE,'readwrite'); tx.objectStore(STORE).put(v,k); tx.oncomplete=()=>res(); tx.onerror=e=>rej(e); }); }
  async function dbGet(k){ const db=await openDb(); return new Promise((res,rej)=>{ const tx=db.transaction(STORE,'readonly'); const rq=tx.objectStore(STORE).get(k); rq.onsuccess=e=>res(e.target.result); rq.onerror=e=>rej(e); }); }
  async function dbDelete(k){ const db=await openDb(); return new Promise((res,rej)=>{ const tx=db.transaction(STORE,'readwrite'); tx.objectStore(STORE).delete(k); tx.oncomplete=()=>res(); tx.onerror=e=>rej(e); }); }

  /* ---------- UI refs ---------- */
  const endpointEl = document.getElementById('endpoint');
  const apikeyEl = document.getElementById('apikey');
  const saveBtn = document.getElementById('saveBtn');
  const clearBtn = document.getElementById('clearBtn');
  const connStatus = document.getElementById('connStatus');
  const chatEl = document.getElementById('chat');
  const userInput = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const streamStatus = document.getElementById('streamStatus');
  const installBtn = document.getElementById('installBtn');
  const cmdHelp = document.getElementById('cmdHelp');
  const copyCmd = document.getElementById('copyCmd');
  const showInstructions = document.getElementById('showInstructions');

  /* ---------- PWA install ---------- */
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', (e)=>{ e.preventDefault(); deferredPrompt=e; installBtn.style.display='inline-block'; });
  installBtn.addEventListener('click', async ()=>{ if(!deferredPrompt) return; deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt=null; installBtn.style.display='none'; });

  /* ---------- Helpers ---------- */
  function isOllamaCommand(s){
    if(!s) return false;
    return /^\s*ollama\s+run\s+[^\s]+/i.test(s);
  }
  function recommendedCommand(){
    return 'ollama run gemma4:31b-cloud';
  }
  function normalizeUrlInput(input){
    if(!input) throw new Error('URL vacía');
    let v = input.trim();
    // If it looks like a command, throw
    if(isOllamaCommand(v)) throw new Error('Comando detectado');
    if(!/^https?:\/\//i.test(v)) v = 'https://' + v;
    const u = new URL(v);
    // Build base origin + maybe path (no trailing slash)
    let base = u.origin + (u.pathname && u.pathname !== '/' ? u.pathname.replace(/\/+$/,'') : '');
    return base;
  }

  /* ---------- Config load/save ---------- */
  async function loadConfig(){
    const ep = await dbGet('endpoint'); if(ep) endpointEl.value = ep;
    const key = await dbGet('apikey'); if(key) apikeyEl.value = key;
  }
  async function saveConfig(){
    const raw = endpointEl.value.trim();
    if(!raw){ connStatus.textContent='Endpoint vacío'; return; }
    // If user pasted an ollama command, show helper and save raw as "cmd" so user doesn't lose it
    if(isOllamaCommand(raw)){
      await dbPut('endpoint_raw', raw);
      await dbPut('endpoint_cmd', raw);
      cmdHelp.style.display = 'block';
      connStatus.textContent = 'Comando detectado — copia y ejecuta en tu servidor';
      return;
    }
    try{
      const normalized = normalizeUrlInput(raw);
      await dbPut('endpoint', normalized);
      await dbPut('apikey', apikeyEl.value.trim());
      connStatus.textContent = 'Guardado. Probando...';
      cmdHelp.style.display = 'none';
      await testEndpoint(normalized, apikeyEl.value.trim());
    }catch(e){
      connStatus.textContent = 'Error: '+e.message;
    }
  }
  async function clearConfig(){
    await dbDelete('endpoint'); await dbDelete('apikey'); await dbDelete('endpoint_cmd'); await dbDelete('endpoint_raw');
    endpointEl.value=''; apikeyEl.value=''; connStatus.textContent='Borrado'; cmdHelp.style.display='none';
  }

  /* ---------- Endpoint test ---------- */
  async function testEndpoint(base, key){
    try{
      connStatus.textContent = 'Probando...';
      // try /health
      try{
        const h = await fetchWithTimeout(base + '/health', { method:'GET', headers: key ? {'Authorization': key} : {}, mode:'cors' }, 6000);
        if(h.ok){ connStatus.textContent='Conectado (health ok)'; return; }
      }catch(err){ /* ignore, try chat */ }

      // try POST /v1/chat probe
      const probeUrl = base.endsWith('/') ? base + 'v1/chat' : base + '/v1/chat';
      const probe = await fetchWithTimeout(probeUrl, {
        method:'POST',
        headers: Object.assign({'Content-Type':'application/json'}, key ? {'Authorization': key} : {}),
        body: JSON.stringify({ messages:[{ role:'system', content:'probe' },{ role:'user', content:'hello' }], model: 'default' }),
        mode:'cors'
      }, 8000);
      if(probe.ok){ connStatus.textContent = 'Conectado (chat ok)'; } else { connStatus.textContent = 'Endpoint respondió '+probe.status; }
    }catch(e){
      connStatus.textContent = 'Error: ' + (e.message || e);
    }
  }

  function fetchWithTimeout(resource, options = {}, timeout = 8000){
    const controller = new AbortController();
    const id = setTimeout(()=>controller.abort(), timeout);
    return fetch(resource, Object.assign({}, options, { signal: controller.signal })).finally(()=>clearTimeout(id));
  }

  /* ---------- Chat rendering ---------- */
  function appendMessage(text, who='bot', partial=false){
    const wrap = document.createElement('div'); wrap.className = 'msg ' + (who==='user' ? 'user' : '');
    const bubble = document.createElement('div'); bubble.className = 'bubble ' + (who==='user' ? 'user' : '');
    bubble.innerHTML = text;
    if(partial) bubble.style.opacity = '0.85';
    wrap.appendChild(bubble); chatEl.appendChild(wrap); chatEl.scrollTop = chatEl.scrollHeight;
    return bubble;
  }

  /* ---------- Send message ---------- */
  async function sendMessageToEndpoint(messages){
    streamStatus.textContent = 'on';
    try{
      const ep = await dbGet('endpoint');
      if(!ep) throw new Error('Endpoint no configurado. Pega una URL válida o ejecuta el comando en tu servidor.');
      const key = await dbGet('apikey');
      const url = ep.endsWith('/') ? ep + 'v1/chat' : ep + '/v1/chat';

      const res = await fetch(url, {
        method:'POST',
        headers: Object.assign({'Content-Type':'application/json'}, key ? {'Authorization': key} : {}),
        body: JSON.stringify({ messages, model: 'default' }),
        cache:'no-store',
        mode:'cors'
      });

      if(!res.ok){
        const txt = await res.text().catch(()=>res.statusText);
        throw new Error('HTTP '+res.status+': '+txt);
      }

      // streaming or final
      const cType = res.headers.get('content-type') || '';
      if(res.body && cType.includes('text/event-stream')){
        const reader = res.body.getReader(); const dec = new TextDecoder();
        let buf=''; const botBubble = appendMessage('','bot',true);
        while(true){
          const {done, value} = await reader.read();
          if(done) break;
          buf += dec.decode(value,{stream:true});
          let parts = buf.split(/\r?\n\r?\n/);
          buf = parts.pop();
          for(const p of parts){
            const line = p.replace(/^data:\s*/,'').trim();
            if(!line) continue;
            if(line === '[DONE]') { done = true; break; }
            try{ const obj = JSON.parse(line); botBubble.innerHTML += escapeHtml(obj.delta?.content || obj.choices?.[0]?.delta?.content || line); }
            catch{ botBubble.innerHTML += escapeHtml(line); }
            chatEl.scrollTop = chatEl.scrollHeight;
          }
        }
        botBubble.style.opacity='1';
      } else if(res.body){
        const reader = res.body.getReader(); const dec = new TextDecoder();
        let acc=''; const botBubble = appendMessage('','bot',true);
        while(true){
          const {done, value} = await reader.read();
          if(done) break;
          const chunk = dec.decode(value,{stream:true});
          acc += chunk;
          botBubble.innerHTML = escapeHtml(acc);
          chatEl.scrollTop = chatEl.scrollHeight;
        }
        botBubble.style.opacity='1';
      } else {
        const json = await res.json();
        const reply = (json.choices && json.choices[0]?.message?.content) || json.output || JSON.stringify(json);
        appendMessage(escapeHtml(reply),'bot');
      }

    }catch(e){
      appendMessage('Error: '+escapeHtml(e.message||e),'bot');
    } finally { streamStatus.textContent='off'; }
  }

  /* ---------- Events ---------- */
  saveBtn.addEventListener('click', saveConfig);
  clearBtn.addEventListener('click', clearConfig);
  sendBtn.addEventListener('click', async ()=>{
    const text = userInput.value.trim(); if(!text) return;
    appendMessage(escapeHtml(text),'user');
    userInput.value='';
    const messages = [{ role:'user', content: text }];
    await sendMessageToEndpoint(messages);
  });
  userInput.addEventListener('keydown',(e)=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendBtn.click(); }});

  copyCmd.addEventListener('click', async ()=>{
    const raw = await dbGet('endpoint_cmd') || recommendedCommand();
    navigator.clipboard.writeText(raw).then(()=>{ connStatus.textContent = 'Comando copiado al portapapeles'; }).catch(()=>{ connStatus.textContent = 'Error copiando comando'; });
  });

  showInstructions.addEventListener('click', ()=>{ alert('Ejecuta en la máquina que hará de servidor (ejemplo):\n\n1) ollama run gemma4:31b-cloud --listen --port 11434 --host 0.0.0.0\n2) Asegúrate de que CORS está habilitado\n3) Pega la URL en esta PWA: http://tu-ip:11434'); });

  /* ---------- Utils ---------- */
  function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  /* ---------- Init & SW ---------- */
  loadConfig();
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('/sw.js').then(()=>console.log('SW registrado')).catch(()=>console.log('SW fallo'));
  }

  // When user types a command into the input, show helper
  endpointEl.addEventListener('input', ()=>{
    const v = endpointEl.value || '';
    if(isOllamaCommand(v)){ cmdHelp.style.display='block'; } else { cmdHelp.style.display='none'; }
  });

  </script>
</body>
</html>
